<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>SePay Sandbox Test - Invoice 27</title>
  </head>

  <body>
    <p>Đang chuyển sang SePay sandbox...</p>

    <form
      id="sepayForm"
      action="https://pay-sandbox.sepay.vn/v1/checkout/init"
      method="POST"
    >
      <input type="hidden" name="payment_method" value="BANK_TRANSFER" />
      <input type="hidden" name="order_invoice_number" value="27" />
      <input type="hidden" name="order_amount" value="1800000" />
      <input type="hidden" name="currency" value="VND" />
      <input
        type="hidden"
        name="order_description"
        value="Thanh toán đặt phòng: 102"
      />
      <input
        type="hidden"
        name="success_url"
        value="http://localhost:5173/manager/bookings?result=success&invoice=27"
      />
      <input
        type="hidden"
        name="error_url"
        value="http://localhost:5173/manager/bookings?result=fail&invoice=27"
      />
      <input
        type="hidden"
        name="cancel_url"
        value="http://localhost:5173/manager/bookings?result=cancel&invoice=27"
      />
      <input type="hidden" name="merchant" value="SP-TEST-PN44AB39" />
      <input type="hidden" name="operation" value="PURCHASE" />
      <input
        type="hidden"
        name="signature"
        value="EXCpMslkqAXdJJyawUuvNAKYk3rJyZZoKBXsl9Pk2mM="
      />
    </form>

    <script>
      // Auto submit
      document.getElementById("sepayForm").submit();
    </script>
  </body>
</html>
